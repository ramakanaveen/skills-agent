# Skills Agent — Backend Configuration
#
# Configuration (non-secret): lives here in config.yaml
# Secrets (API keys, tokens): live in .env — never commit .env
#
# All values here can be overridden with environment variables.
# Env var name: SKILLS_AGENT_<SECTION>_<KEY> (uppercase, underscores)
# Example: SKILLS_AGENT_MODEL_NAME=claude-opus-4-6

# API provider: "anthropic" (direct) or "vertex" (Google Vertex AI)
# Override with: SKILLS_AGENT_PROVIDER
provider: anthropic

# Vertex AI settings — only required when provider: vertex
vertex:
  project_id: ""       # SKILLS_AGENT_VERTEX_PROJECT_ID
  region: us-east5     # SKILLS_AGENT_VERTEX_REGION
  base_url: ""         # SKILLS_AGENT_VERTEX_BASE_URL (optional — corporate proxy)

model:
  # Anthropic direct API model ID
  name: claude-sonnet-4-20250514
  # Vertex AI model ID (@ separator instead of -)
  vertex_name: claude-sonnet-4@20250514
  # Maximum tokens in a single API response
  max_tokens: 16384

agent:
  # Hard cap on agentic loop iterations per run
  max_iterations: 20
  # Context window token budget (chars / 4 ≈ tokens); trim when exceeded
  context_budget: 150000
  # Number of most-recent messages to keep after context trim
  context_trim_keep: 16
  # How many times the loop may nudge Claude when it ends its turn without
  # making any tool call (announce-and-stop pattern). 1 is almost always enough.
  max_nudges: 1
  # How many times the loop may continue after a max_tokens stop.
  # Each continuation appends the partial response and sends "Continue."
  # Guards against infinite loops on genuinely unbounded output.
  max_continuations: 3

tools:
  # Characters of tool result sent back to the frontend for display
  result_preview_chars: 500
  # Max stdout/stderr kept from run_code (in chars)
  run_code_stdout_limit: 3000
  run_code_stderr_limit: 2000
  # Subprocess timeout for run_code (seconds)
  run_code_timeout: 30
  text_file_limit: 50000

server:
  # CORS allowed origins (comma-separated string or list)
  cors_origins:
    - http://localhost:5173
    - http://127.0.0.1:5173

# MCP Servers — leave as empty list to disable MCP entirely.
# Each entry connects to one MCP server at startup, discovers its tools,
# and registers them in the tool registry as "{server_name}__{tool_name}".
# Auth env vars (e.g. "${GITHUB_TOKEN}") are resolved from the environment.
# Failed servers are skipped with a warning — the app still starts.
#
# Supported transports:
#   stdio — spawn a local process, communicate via JSON-RPC over stdin/stdout
#   http  — send JSON-RPC POST requests to a running HTTP server
#
# Example:
# mcp_servers:
#   - name: github
#     transport: stdio
#     command: "npx -y @modelcontextprotocol/server-github"
#     env:
#       GITHUB_TOKEN: "${GITHUB_TOKEN}"
#     enabled: true
#     rate_limit: 30        # max tool calls per session (default 50)
#
#   - name: confluence
#     transport: http
#     url: "http://confluence-mcp.internal:3000"
#     headers:
#       Authorization: "Bearer ${CONFLUENCE_TOKEN}"
#     enabled: true
#     rate_limit: 50
mcp_servers: []
